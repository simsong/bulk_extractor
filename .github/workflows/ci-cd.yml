name: bulk_extractor build and test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-22.04, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    env:
      DEBUG_5G: FALSE
      DEBUG_FAST: FALSE
      MAKE_OPTS: -j2

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version
        id: extract_version
        run: |
          version=$(grep 'AC_INIT(\[BULK_EXTRACTOR\]' configure.ac | cut -d',' -f2 | tr -d '[]')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install macOS dependencies
        if: startsWith(matrix.os, 'macos')
        run: |
          source "$HOME/.bashrc"
          echo "" | bash etc/CONFIGURE_MACOS.bash

      - name: Install Ubuntu dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: echo "" | bash etc/CONFIGURE_UBUNTU22LTS.bash

      - name: Bootstrap
        run: bash bootstrap.sh

      - name: AddressSanitizer debug build and tests
        run: |
          source "$HOME/.bashrc"
          ./configure --disable-opt --enable-address-sanitizer
          make $MAKE_OPTS all
          make -C src $MAKE_OPTS bulk_extractor
          make -C src check || (cat src/test-suite.log; exit 1)
          make distclean

      - name: AddressSanitizer optimized build and tests
        run: |
          source "$HOME/.bashrc"
          ./configure --enable-address-sanitizer --enable-silent-rules --quiet
          make $MAKE_OPTS all
          make -C src $MAKE_OPTS bulk_extractor
          make -C src check || (cat src/test-suite.log; exit 1)
          make distclean

      - name: Distribution check
        run: |
          source "$HOME/.bashrc"
          ./configure --quiet
          make distcheck

      - name: Upload source distribution
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: bulk_extractor-${{ steps.extract_version.outputs.version }}-${{ matrix.os }}
          path: bulk_extractor-${{ steps.extract_version.outputs.version }}.tar.gz
